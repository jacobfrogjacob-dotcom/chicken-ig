<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG粉絲小程序</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --red: #8B0000; --gold: #B8860B; --black: #1a1a1a; --paper: #f4efe4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Serif TC', serif; background: var(--paper); color: var(--black); padding-bottom: 70px; }

    .btn-red { background: var(--red); color: white; border: 2px solid var(--black); padding: 14px; font-size: 16px; cursor: pointer; width: 100%; }
    .btn-red:hover { background: var(--black); }
    .btn-gold { background: var(--gold); color: white; border: 2px solid var(--black); padding: 10px; font-size: 14px; cursor: pointer; }
    
    .input-field { background: var(--paper); border: 2px solid var(--black); padding: 12px; font-size: 16px; width: 100%; }
    .input-field:focus { outline: none; border-color: var(--red); }
    
    .card { background: white; border: 2px solid var(--black); padding: 16px; }
    .card-title { font-size: 20px; color: var(--red); border-bottom: 2px solid var(--red); padding-bottom: 8px; margin-bottom: 12px; }
    
    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid var(--black); display: flex; justify-content: space-around; padding: 10px 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #666; cursor: pointer; }
    .nav-item.active { color: var(--red); font-weight: bold; }
    
    .page { display: none; }
    .page.active { display: block; }
    
    .header { background: var(--red); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .coin { background: var(--gold); color: white; padding: 4px 10px; border-radius: 12px; font-size: 14px; }
    
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
    
    .rarity-N { color: #6b7280; }
    .rarity-R { color: #2563eb; }
    .rarity-SSR { color: #9333ea; }
    .rarity-LOG { color: #d97706; }
    
    .seal { background: var(--red); color: white; padding: 2px 8px; font-size: 12px; }
    
    #appPage, #loginPage { display: none; }
  </style>
</head>
<body>
  <!-- 登入頁面 -->
  <div id="loginPage" class="page" style="display: none; min-height: 100vh; padding: 20px;">
    <div style="max-width: 400px; margin: 0 auto; padding-top: 60px;">
      <div class="card" style="text-align: center; border: 3px solid var(--black);">
        <h1 style="font-size: 32px; color: var(--red); margin-bottom: 20px;">IG粉絲小程序</h1>
        <p style="color: #666; margin-bottom: 30px;">請先登入開始使用</p>
        <button class="btn-red" onclick="login()">Google 帳號登入</button>
      </div>
    </div>
  </div>

  <!-- 主APP -->
  <div id="appPage" class="page" style="display: none;">
    <div class="header">
      <h1>粉絲小程序</h1>
      <div style="display: flex; gap: 10px; align-items: center;">
        <span class="coin">💰<span id="coins">0</span></span>
        <button onclick="logout()" style="background: white; color: var(--red); border: none; cursor: pointer;">登出</button>
      </div>
    </div>

    <!-- 首頁 -->
    <div id="home" class="active" style="padding: 16px;">
      <div class="card" style="text-align: center; margin-bottom: 16px;">
        <h2 style="color: var(--red);">歡迎回來</h2>
        <p id="userName"></p>
        <span id="adminTag" class="seal" style="display: none;">管理員</span>
      </div>
      <div class="card" style="margin-bottom: 16px;">
        <h3 class="card-title">📢 公告</h3>
        <div id="annList"></div>
      </div>
      <div class="grid-2">
        <div class="card" style="cursor: pointer;" onclick="nav('cards')"><div style="font-size: 28px;">🎴</div><p>卡牌</p></div>
        <div class="card" style="cursor: pointer;" onclick="nav('draw')"><div style="font-size: 28px;">🎰</div><p>抽卡</p></div>
        <div class="card" style="cursor: pointer;" onclick="nav('submit')"><div style="font-size: 28px;">✍️</div><p>投稿</p></div>
        <div class="card" style="cursor: pointer;" onclick="nav('admin')"><div style="font-size: 28px;">⚙️</div><p>管理</p></div>
      </div>
    </div>

    <!-- 客服 -->
    <div id="service" style="padding: 16px;">
      <div class="card">
        <h3 class="card-title">📞 客服</h3>
        <div id="chatBox" style="height: 280px; overflow-y: auto; background: var(--paper); border: 1px solid var(--black); padding: 10px; margin-bottom: 12px;"></div>
        <input id="msgInput" class="input-field" placeholder="訊息...">
        <button class="btn-red" style="margin-top: 10px;" onclick="sendMsg()">發送</button>
      </div>
    </div>

    <!-- 社團 -->
    <div id="community" style="padding: 16px;">
      <div class="card">
        <h3 class="card-title">👥 粉絲團</h3>
        <button class="btn-red" onclick="createComm()">創建 (500💰)</button>
      </div>
    </div>

    <!-- 商店 -->
    <div id="shop" style="padding: 16px;">
      <div class="card">
        <h3 class="card-title">🛒 商店</h3>
        <div class="grid-2" style="margin-bottom: 12px;">
          <button class="btn-gold" onclick="buyPack(100)">基礎包 100</button>
          <button class="btn-gold" onclick="buyPack(300)">稀有包 300</button>
          <button class="btn-gold" onclick="buyPack(1000)">傳說包 1000</button>
          <button class="btn-gold" onclick="buyPack(5000)">隱藏包 5000</button>
        </div>
      </div>
    </div>

    <!-- 卡牌 -->
    <div id="cards" style="padding: 16px;">
      <div class="card">
        <h3 class="card-title">🎴 卡牌 <span id="cardCount"></span></h3>
        <div id="cardGrid" class="grid-2"></div>
      </div>
    </div>

    <!-- 抽卡 -->
    <div id="draw" style="padding: 16px;">
      <div class="card" style="text-align: center; margin-bottom: 16px;">
        <p>今日免費次數</p>
        <p style="font-size: 28px; color: var(--red);" id="freeCount">1</p>
      </div>
      <div id="drawResult" style="text-align: center; padding: 30px;">
        <div style="font-size: 48px;">🎰</div>
      </div>
      <button class="btn-red" onclick="doDraw()">免費抽卡</button>
      <div class="card" style="margin-top: 16px;">
        <div class="grid-4">
          <div><span class="rarity-N">普通</span><br><small>60%</small></div>
          <div><span class="rarity-R">���有</span><br><small>25%</small></div>
          <div><span class="rarity-SSR">傳說</span><br><small>12%</small></div>
          <div><span class="rarity-LOG">隱藏</span><br><small>3%</small></div>
        </div>
      </div>
    </div>

    <!-- 投稿 -->
    <div id="submit" style="padding: 16px;">
      <div class="card">
        <h3 class="card-title">✍️ 投稿</h3>
        <textarea id="postContent" class="input-field" rows="4" placeholder="內容..."></textarea>
        <input id="postImage" class="input-field" style="margin-top: 10px;" placeholder="圖片網址">
        <button class="btn-red" style="margin-top: 10px;" onclick="submitPost()">提交</button>
      </div>
    </div>

    <!-- 管理 -->
    <div id="admin" style="padding: 16px;">
      <div class="card">
        <h3 class="card-title">⚙️ 管理</h3>
        <input id="annTitle" class="input-field" placeholder="標題">
        <textarea id="annContent" class="input-field" style="margin-top: 10px;" rows="3" placeholder="內容"></textarea>
        <button class="btn-red" style="margin-top: 10px;" onclick="postAnn()">發布公告</button>
        <div id="subList" style="margin-top: 16px;"></div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-item active" onclick="nav('home')"><span style="font-size: 20px;">🏠</span><span>首頁</span></div>
      <div class="nav-item" onclick="nav('service')"><span style="font-size: 20px;">📞</span><span>客服</span></div>
      <div class="nav-item" onclick="nav('community')"><span style="font-size: 20px;">👥</span><span>社團</span></div>
      <div class="nav-item" onclick="nav('shop')"><span style="font-size: 20px;">🛒</span><span>商店</span></div>
    </nav>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_gBRP1HaiEgWXML5_HOGDcukElEBCKes",
      authDomain: "ig-chicken.firebaseapp.com",
      projectId: "ig-chicken",
      storageBucket: "ig-chicken.firebasestorage.app",
      messagingSenderId: "336000604442",
      appId: "1:336000604442:web:25da73c459e1a5d86ab4a3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let user = null;
    let coins = 0;
    let isAdmin = false;
    let lastDraw = null;

    const CARDS = [
      {id:'1',name:'小雞',rarity:'N'},{id:'2',name:'基礎',rarity:'N'},
      {id:'3',name:'進階',rarity:'R'},{id:'4',name:'稀有',rarity:'R'},
      {id:'5',name:'傳說',rarity:'SSR'},{id:'6',name:'英雄',rarity:'SSR'},
      {id:'7',name:'隱藏',rarity:'LOG'},{id:'8',name:'神秘',rarity:'LOG'}
    ];
    const RARITY = {N:60,R:25,SSR:12,LOG:3};

    function nav(page) {
      document.querySelectorAll('#appPage > div').forEach(d => d.style.display = 'none');
      document.getElementById(page).style.display = 'block';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.closest('.nav-item')?.classList.add('active');
    }

    async function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch(e) {
        alert('請允許彈出視窗！');
      }
    }

    async function logout() {
      await auth.signOut();
    }

    auth.onAuthStateChanged(async (u) => {
      if (!u) {
        document.getElementById('loginPage').style.display = 'block';
        document.getElementById('appPage').style.display = 'none';
        return;
      }
      user = u;
      isAdmin = u.email === 'jacob.frog.jacob@gmail.com';
      
      const doc = await db.collection('users').doc(u.uid).get();
      if (doc.exists) {
        coins = doc.data().coins || 0;
        lastDraw = doc.data().lastDraw;
      } else {
        await db.collection('users').doc(u.uid).set({email:u.email,displayName:u.displayName,coins:0,createdAt:new Date()});
        coins = 0;
      }
      
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('appPage').style.display = 'block';
      updateUI();
      loadData();
    });

    function updateUI() {
      document.getElementById('coins').textContent = coins;
      document.getElementById('userName').textContent = user?.displayName;
      document.getElementById('adminTag').style.display = isAdmin ? 'inline-block' : 'none';
    }

    async function loadData() {
      const snap = await db.collection('announcements').orderBy('createdAt','desc').limit(5).get();
      document.getElementById('annList').innerHTML = snap.empty ? '<p style="color:#888;">無公告</p>' : 
        snap.docs.map(d=>`<div style="border-left:3px solid var(--red);padding-left:10px;margin:8px 0;"><b>${d.data().title}</b><p style="font-size:14px;color:#666;">${d.data().content}</p></div>`).join('');
      
      const csnap = await db.collection('userCards').where('uid','==',user.uid).get();
      document.getElementById('cardCount').textContent = `(${csnap.size}張)`;
      document.getElementById('cardGrid').innerHTML = csnap.empty ? '<p style="grid-column:span 2;color:#888;">無卡牌</p>' :
        csnap.docs.map(d=>{
          const c = d.data();
          return `<div class="card" style="text-align:center;padding:10px;"><img src="cards/${c.cardId}.png" style="width:100%;aspect-ratio:1;object-fit:contain;"><p class="rarity-${c.rarity}" style="font-weight:bold;">${c.name}</p></div>`;
        }).join('');
      
      document.getElementById('freeCount').textContent = (lastDraw === new Date().toLocaleDateString('zh-TW')) ? 0 : 1;
      
      if (isAdmin) {
        const ssnap = await db.collection('submissions').where('status','==','pending').get();
        document.getElementById('subList').innerHTML = ssnap.empty ? '<p>無投稿</p>' :
          ssnap.docs.map(d=>`<div style="border:1px solid #ccc;padding:10px;margin:8px 0;"><b>${d.data().userName}</b><p>${d.data().content}</p><button class="btn-gold" onclick="approve('${d.id}')">通過</button></div>`).join('');
      }
    }

    async function doDraw() {
      const today = new Date().toLocaleDateString('zh-TW');
      let free = (lastDraw === today) ? 0 : 1;
      if (free === 0 && coins < 100) { alert('不足'); return; }
      
      if (free > 0) {
        await db.collection('users').doc(user.uid).update({lastDraw:today});
      } else {
        coins -= 100;
        await db.collection('users').doc(user.uid).update({coins:coins});
      }
      
      document.getElementById('drawResult').innerHTML = '<div style="font-size:32px;">旋轉中...</div>';
      await new Promise(r=>setTimeout(r,1500));
      
      let r = Math.random()*100, cum=0, rar='N';
      for (const [k,v] of Object.entries(RARITY)) { cum+=v; if (r<=cum) {rar=k; break;} }
      const c = CARDS.filter(x=>x.rarity===rar)[Math.floor(Math.random()*CARDS.filter(x=>x.rarity===rar).length)] || CARDS[0];
      await db.collection('userCards').add({uid:user.uid,cardId:c.id,name:c.name,rarity:c.rarity,date:new Date()});
      
      document.getElementById('drawResult').innerHTML = `<div style="text-align:center;">
        <img src="cards/${c.id}.png" style="width:120px;">
        <p class="rarity-${rar}" style="font-size:18px;font-weight:bold;">${c.name}</p>
        <p class="rarity-${rar}">${rar==='N'?'普通':rar==='R'?'稀有':rar==='SSR'?'傳說':'隱藏'}</p>
      </div>`;
      updateUI();
      loadData();
    }

    async function submitPost() {
      const con = document.getElementById('postContent').value;
      const img = document.getElementById('postImage').value;
      if (!con) return;
      await db.collection('submissions').add({userId:user.uid,userName:user.displayName,content:con,imageUrl:img,status:'pending',createdAt:new Date()});
      alert('成功');
      document.getElementById('postContent').value = '';
    }

    async function postAnn() {
      const t = document.getElementById('annTitle').value;
      const c = document.getElementById('annContent').value;
      if (!t||!c) return;
      await db.collection('announcements').add({title:t,content:c,createdAt:new Date()});
      document.getElementById('annTitle').value = '';
      document.getElementById('annContent').value = '';
      loadData();
    }

    async function buyPack(price) {
      if (coins < price) { alert('不足'); return; }
      coins -= price;
      await db.collection('users').doc(user.uid).update({coins:coins});
      alert('成功');
      updateUI();
    }

    async function createComm() {
      if (coins < 500) { alert('不足'); return; }
      coins -= 500;
      await db.collection('users').doc(user.uid).update({coins:coins});
      alert('成功');
      updateUI();
    }

    async function sendMsg() {
      const m = document.getElementById('msgInput').value;
      if (!m) return;
      await db.collection('service').add({uid:user.uid,msg:m,createdAt:new Date()});
      document.getElementById('msgInput').value = '';
      alert('已發送');
    }

    async function approve(id) {
      await db.collection('submissions').doc(id).update({status:'approved'});
      loadData();
    }
  </script>
</body>
</html>
